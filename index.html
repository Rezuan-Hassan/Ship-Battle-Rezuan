<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ship-Battle-Rezuan</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; overflow: hidden; touch-action: none; }
        #bg-video { position: fixed; right: 0; bottom: 0; min-width: 100%; min-height: 100%; z-index: -1; opacity: 0.4; object-fit: cover; }
        #game-title { position: absolute; top: 10px; width: 100%; text-align: center; font-size: 20px; font-weight: bold; color: #00f2ff; text-shadow: 0 0 10px #00f2ff; z-index: 5; }
        #lobby { position: absolute; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        .ui-layer { position: absolute; top: 50px; width: 100%; display: flex; justify-content: space-around; font-weight: bold; pointer-events: none; }
        canvas { display: block; margin: 0 auto; width: 100%; max-width: 800px; height: auto; }
        .controls { position: fixed; bottom: 20px; width: 100%; display: flex; justify-content: space-between; padding: 0 20px; box-sizing: border-box; }
        .move-btns { display: flex; gap: 10px; }
        .btn { width: 70px; height: 70px; background: rgba(0,242,255,0.2); border: 2px solid #00f2ff; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        #fire-btn { width: 90px; height: 90px; border-radius: 50%; background: #ff4757; border: 4px solid white; color: white; font-weight: bold; }
        .shop { position: fixed; top: 90px; right: 10px; display: flex; flex-direction: column; gap: 5px; }
        .shop-btn { padding: 8px; background: #28a745; border: none; border-radius: 5px; color: white; font-size: 11px; }
        input { padding: 12px; border-radius: 8px; border: 2px solid #00f2ff; background: #222; color: white; margin: 10px; text-align: center; }
    </style>
</head>
<body>
    <video autoplay muted loop playsinline id="bg-video"><source src="sea.mp4" type="video/mp4"></video>
    <div id="game-title">SHIP-BATTLE-REZUAN</div>
    <div id="lobby">
        <div id="my-id">Generating ID...</div>
        <input type="text" id="friend-id" placeholder="Paste Friend's ID">
        <button onclick="connectToFriend()" style="padding:12px; background:#00f2ff; border:none; border-radius:8px;">START BATTLE</button>
    </div>
    <div class="ui-layer">
        <div>$ <span id="money-display">0</span></div>
        <div>ROUND <span id="round-display">1</span>/8</div>
    </div>
    <div class="shop">
        <button class="shop-btn" onclick="buyRepair()">REPAIR ($75)</button>
        <button class="shop-btn" onclick="buyUlti()">ULTI ($250)</button>
    </div>
    <canvas id="gameCanvas"></canvas>
    <div class="controls">
        <div class="move-btns">
            <div class="btn" id="left-btn">LEFT</div>
            <div class="btn" id="right-btn">RIGHT</div>
        </div>
        <div id="fire-btn" style="display:flex; align-items:center; justify-content:center;">FIRE</div>
    </div>
    <script src="script.js"></script>
</body>
</html>
